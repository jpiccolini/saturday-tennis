<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; display: flex; justify-content: center; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #333; }
        .admin-link { display: block; background: #ff9800; color: black; text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .back { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    {% if is_admin %}
        <a href="/admin_panel" class="admin-link">⚠️ ENTER MASTER ADMIN PANEL</a>
    {% endif %}

    <h2>Hello, {{ user.first }}!</h2>

    <form action="/update_profile" method="POST">
        <input type="hidden" name="id" value="{{ user.id }}">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}">
        <label>Backup Email</label>
        <input type="email" name="backup_email" value="{{ user.backup_email }}">
        <label>Cell</label>
        <input type="text" name="cell" value="{{ user.cell }}">
        <button type="submit">Save Changes</button>
    </form>
    <a href="/" class="back">← Back to Home</a>
</div>
</body>
</html>
