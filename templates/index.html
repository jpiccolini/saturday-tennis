{% if session.user and session.user.is_admin %}
<div class="notification is-dark mt-6">
    <h3 class="title is-4 has-text-white">Admin: Management Console</h3>
    
    <div class="columns">
        <div class="column">
            <div class="box has-text-dark">
                <h4 class="label">Update Weekly Info</h4>
                <form action="/admin_action" method="post">
                    <input class="input mb-2" name="date" placeholder="Next Saturday Date">
                    <input class="input mb-2" name="time" placeholder="Start Time (e.g. 8:45 AM)">
                    <button class="button is-warning is-fullwidth mb-2" name="action" value="labels">Update Labels</button>
                    <button class="button is-danger is-fullwidth" name="action" value="reset_roster" onclick="return confirm('Erase all signups for next week?')">RESET ROSTER</button>
                </form>
            </div>
        </div>

        <div class="column is-two-thirds">
            <div class="box has-text-dark" style="max-height: 400px; overflow-y: auto;">
                <h4 class="label">Player Notes & Attendance</h4>
                <table class="table is-narrow is-fullwidth">
                    <thead><tr><th>Name</th><th>Note/Injury</th><th>Action</th></tr></thead>
                    <tbody>
                        {% for m in master_list %}
                        <tr>
                            <td>{{ m.fields.First }}</td>
                            <td>
                                <form action="/admin_action" method="post" class="is-flex">
                                    <input type="hidden" name="player_id" value="{{ m.id }}">
                                    <input class="input is-small" name="note" value="{{ m.fields.Notes or '' }}" placeholder="Add note...">
                                    <button class="button is-small is-info" name="action" value="player_update">Save</button>
                                </form>
                            </td>
                            <td>
                                <form action="/no_show/{{ m.fields.Code }}" method="post">
                                    <button class="button is-small is-danger is-outlined">Strike</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endif %}
