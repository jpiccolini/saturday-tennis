<div class="login-box">
    <form action="/validate" method="POST">
        <div class="mb-2">
            <label class="form-label">Enter Player Code</label>
            <input type="text" name="code" id="player-code" class="form-control form-control-lg text-center" 
                   placeholder="Enter your 4-digit code" maxlength="4" required>
        </div>
        </form>
</div>

<div class="header-card">
    <h3>Hello, {{ session.user.first }}!</h3>
    
    {% if waitlist_pos > 0 %}
        <div class="alert alert-warning">⏳ You are currently <strong>#{{ waitlist_pos }}</strong> on the Waitlist.</div>
    {% endif %}

    <div class="d-grid gap-2 d-md-block mt-3">
        {% if user_on_roster %}
            <form action="/cancel" method="POST" style="display:inline;">
                {% if is_past_deadline %}
                    <button type="submit" class="btn btn-warning btn-lg">Request a Sub</button>
                {% else %}
                    <button type="submit" class="btn btn-danger btn-lg">Drop Out</button>
                {% endif %}
            </form>
        {% else %}
            <form action="/signup" method="POST" style="display:inline;">
                <button type="submit" class="btn btn-success btn-lg" {% if strikes >= 3 %}disabled{% endif %}>
                    Sign Up for This Week
                </button>
            </form>
        {% endif %}
        <a href="/logout" class="btn btn-outline-secondary btn-lg">Logout</a>
    </div>
</div>
