{% if session.get('user') and session.user.is_admin %}
            {% if applicants %}
            <div class="card p-4 border-warning mt-4">
                <h5 class="text-warning fw-bold">⚡ Pending Applications</h5>
                <div class="table-responsive">
                    <table class="table table-sm align-middle">
                        <thead><tr><th>Name</th><th>Note</th><th>Action</th></tr></thead>
                        <tbody>
                            {% for a in applicants %}
                            <tr>
                                <td><b>{{ a.fields.First }} {{ a.fields.Last }}</b><br><small>{{ a.fields.Email }}</small></td>
                                <td><small>{{ a.fields.Note }}</small></td>
                                <td>
                                    <div class="d-flex gap-2">
                                        <form action="/approve/{{ a.id }}" method="POST">
                                            <button class="btn btn-success btn-sm">Approve</button>
                                        </form>
                                        <form action="/reject/{{ a.id }}" method="POST">
                                            <button class="btn btn-outline-danger btn-sm">Reject</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
            {% endif %}
